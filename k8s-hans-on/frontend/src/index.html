<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kubernetes Hands-On</title>
    <style>
        :root {
            color-scheme: dark;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #0b1020;
            color: #eef2ff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            padding: 24px;
            background:
                radial-gradient(circle at 15% 15%, rgba(45, 212, 191, 0.2), transparent 30%),
                radial-gradient(circle at 85% 85%, rgba(129, 140, 248, 0.22), transparent 35%),
                #0b1020;
        }

        main {
            width: min(100%, 760px);
            overflow: hidden;
            border: 1px solid rgba(165, 180, 252, 0.2);
            border-radius: 28px;
            background: rgba(15, 23, 42, 0.82);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(18px);
        }

        header {
            padding: 36px 36px 28px;
            border-bottom: 1px solid rgba(165, 180, 252, 0.14);
        }

        .eyebrow {
            margin: 0 0 12px;
            color: #5eead4;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.16em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0;
            font-size: clamp(2rem, 6vw, 3.8rem);
            letter-spacing: -0.05em;
            line-height: 0.98;
        }

        .subtitle {
            max-width: 520px;
            margin: 16px 0 0;
            color: #a5b4fc;
            line-height: 1.6;
        }

        .content {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            padding: 24px 36px 36px;
        }

        .metric {
            padding: 24px;
            border: 1px solid rgba(165, 180, 252, 0.16);
            border-radius: 20px;
            background: rgba(30, 41, 59, 0.7);
        }

        .label {
            margin: 0 0 14px;
            color: #94a3b8;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .value {
            margin: 0;
            color: #f8fafc;
            font-size: clamp(1.3rem, 4vw, 2rem);
            font-weight: 700;
            overflow-wrap: anywhere;
        }

        #time {
            color: #5eead4;
        }

        #status {
            grid-column: 1 / -1;
            margin: 4px 0 0;
            color: #94a3b8;
            font-size: 0.9rem;
        }

        @media (max-width: 560px) {
            body {
                padding: 14px;
            }

            header,
            .content {
                padding-left: 22px;
                padding-right: 22px;
            }

            .content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <main>
        <header>
            <p class="eyebrow">Kubernetes Hands-On</p>
            <h1>Estado del servicio</h1>
            <p class="subtitle">Datos entregados por el backend que se está ejecutando en el clúster.</p>
        </header>

        <section class="content" aria-live="polite">
            <article class="metric">
                <p class="label">Hora del backend</p>
                <p class="value" id="time">Cargando...</p>
            </article>
            <article class="metric">
                <p class="label">Hostname del pod</p>
                <p class="value" id="hostname">Cargando...</p>
            </article>
            <p id="status">Conectando con el backend...</p>
        </section>
    </main>

    <script>
        fetch("/api/")
            .then(function(response) {
                if (!response.ok) {
                    throw new Error("HTTP " + response.status);
                }
                return response.json();
            })
            .then(function(data) {
                document.getElementById("time").textContent = new Date(data.time).toLocaleString();
                document.getElementById("hostname").textContent = data.hostname;
                document.getElementById("status").textContent = "Backend conectado correctamente";
            })
            .catch(function(error) {
                document.getElementById("time").textContent = "No disponible";
                document.getElementById("hostname").textContent = "No disponible";
                document.getElementById("status").textContent = "No se pudo conectar con el backend: " + error.message;
            });
    </script>
</body>
</html>
